name: CVIS v9 CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/cvis-backend

jobs:
  # ── 1. Lint ───────────────────────────────────────────
  lint:
    name: Lint & type check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip }
      - run: pip install ruff mypy types-redis
      - run: ruff check . && ruff format --check .
      - run: mypy backend_v9.py auth.py redis_store.py logging_config.py --ignore-missing-imports --no-strict-optional

  # ── 2. Tests ──────────────────────────────────────────
  test:
    name: Test suite
    runs-on: ubuntu-22.04
    needs: lint
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip }
      - run: pip install -r requirements.txt && pip install pytest pytest-asyncio pytest-cov httpx
      - name: Run tests
        env:
          REDIS_URL: redis://localhost:6379/0
          CVIS_API_KEY: ci-bootstrap-key
          JWT_SECRET: ci-test-secret
          CVIS_ADMIN_PASS: ci-test-pass
        run: pytest tests/ -v --cov=. --cov-report=xml --cov-report=term-missing --cov-fail-under=60 -x
      - uses: codecov/codecov-action@v4
        if: always()
        with: { file: coverage.xml, fail_ci_if_error: false }

  # ── 3. Build & push image ─────────────────────────────
  build:
    name: Build & push image
    runs-on: ubuntu-22.04
    needs: test
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      tags:   ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch,suffix=-${{ github.sha }}
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
      - id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: runtime
          push: ${{ github.event_name != 'pull_request' }}
          tags:   ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          platforms: linux/amd64,linux/arm64
      - run: echo "Digest ${{ steps.build.outputs.digest }}"

  # ── 4. Security scan ──────────────────────────────────
  security:
    name: Security scan
    runs-on: ubuntu-22.04
    needs: build
    if: github.event_name != 'pull_request'
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with: { sarif_file: trivy.sarif }
      - run: pip install pip-audit && pip-audit -r requirements.txt --strict

  # ── 5. Deploy staging ─────────────────────────────────
  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-22.04
    needs: [build, security]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment:
      name: staging
      url: https://staging.yourdomain.com
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key:      ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -e
            cd /opt/cvis
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:develop-${{ github.sha }}"
            sed -i "s|image: cvis-backend:.*|image: ${IMAGE}|" docker-compose.yml
            docker compose pull backend
            docker compose up -d --no-deps --wait backend
            curl -sf http://localhost:8000/health | grep '"status"'
            echo "Staging deploy OK"
      - uses: slackapi/slack-github-action@v1.26
        if: always()
        with:
          payload: '{"text":"${{ job.status == ''success'' && ''✅'' || ''❌'' }} Staging: *${{ github.ref_name }}* @ `${{ github.sha }}` — ${{ job.status }}"}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  # ── 6. Deploy production (on release tag) ─────────────
  deploy-production:
    name: Deploy to production
    runs-on: ubuntu-22.04
    needs: [build, security]
    if: github.event_name == 'release'
    environment:
      name: production
      url: https://yourdomain.com
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key:      ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -e
            cd /opt/cvis
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.release.tag_name }}"
            sed -i "s|image: cvis-backend:.*|image: ${IMAGE}|" docker-compose.yml
            # Pre-deploy model snapshot
            docker compose exec -T backend tar czf /app/model_versions/pre_deploy.tar.gz /app/model_versions/*.json 2>/dev/null || true
            docker compose pull backend
            docker compose up -d --no-deps --wait backend
            curl -sf https://localhost/health | grep '"status"'
            echo "Production deploy OK: ${{ github.event.release.tag_name }}"
      - uses: slackapi/slack-github-action@v1.26
        if: always()
        with:
          payload: '{"text":"${{ job.status == ''success'' && ''🚀'' || ''🔥'' }} Production: *${{ github.event.release.tag_name }}* — ${{ job.status }}"}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
