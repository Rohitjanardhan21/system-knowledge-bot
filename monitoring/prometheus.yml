global:
  scrape_interval:     10s    # how often to scrape
  evaluation_interval: 10s
  external_labels:
    environment: production
    app: cvis-v9

# ── Alert rules (optional — needs alertmanager) ───────────
# rule_files:
#   - /etc/prometheus/rules/*.yml

scrape_configs:

  # CVIS backend — our custom /metrics endpoint
  - job_name: cvis_backend
    static_configs:
      - targets: ['backend:8000']
    metrics_path: /metrics
    scrape_interval: 10s
    scrape_timeout:  5s

  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # Redis exporter (optional — add redis_exporter container)
  # - job_name: redis
  #   static_configs:
  #     - targets: ['redis-exporter:9121']
